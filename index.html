<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HEYPEOPLE · Loading…</title>

  /manifest.json
  /icon.png
  <meta name="theme-color" content="#070707" />

  <style>
    body {
      margin:0;
      padding:0;
      background:#070707;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: 'DM Sans', sans-serif;
      text-align:center;
      color:#DFFF00;
    }
    a { color:#DFFF00; font-size:14px; }
    #box { max-width:260px; }
  </style>
</head>

<body>
  <div id="box">
    <div id="msg">Caricamento…</div>
    <div style="margin-top:14px;">
      /auth.htmlVai al login</a> · 
      /app.htmlVai all’app</a>
    </div>
  </div>

  <!-- ROUTER -->
  <script type="module">
    import { supabase } from "/assets/js/supabase.js";

    async function go() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          location.href = "/app.html";
        } else {
          location.href = "/auth.html";
        }
      } catch (e) {
        document.getElementById("msg").textContent =
          "Errore di rete. Usa i link sotto.";
        console.error(e);
      }
    }

    go();
  </script>
</body>
</html>
